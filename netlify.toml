[build]
  functions = "netlify/functions"
  publish = "."

# Map clean API paths → Netlify Functions

[[redirects]]
  from = "/api/kols/list"
  to = "/.netlify/functions/kols-list"
  status = 200

[[redirects]]
  from = "/api/kols/validate/:code"
  to = "/.netlify/functions/kols-validate?code=:code"
  status = 200

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/kol-apply"
  to = "/.netlify/functions/kol-apply"
  status = 200

[[redirects]]
  from = "/api/kol-approve"
  to = "/.netlify/functions/kol-approve"
  status = 200

[[redirects]]
  from = "/api/kol-reject"
  to = "/.netlify/functions/kol-reject"
  status = 200

# ✅ NEW: NewebPay payment webhook (NotifyURL)
[[redirects]]
  from = "/api/payment-callback"
  to = "/.netlify/functions/payment-callback"
  status = 200
