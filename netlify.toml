[build]
  functions = "netlify/functions"
  publish = "."

# Map clean API paths → Netlify Functions
# Homepage → register page
[[redirects]]
  from = "/"
  to = "/register.html"
  status = 200
  
[[redirects]]
  from = "/api/kols/list"
  to = "/.netlify/functions/kols-list"
  status = 200

[[redirects]]
  from = "/api/kols/validate/*"
  to = "/.netlify/functions/kols-validate?code=:splat"
  status = 200

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/kol-apply"
  to = "/.netlify/functions/kol-apply"
  status = 200

[[redirects]]
  from = "/api/kol-approve"
  to = "/.netlify/functions/kol-approve"
  status = 200

[[redirects]]
  from = "/api/kol-reject"
  to = "/.netlify/functions/kol-reject"
  status = 200

[[redirects]]
  from = "/api/payment-callback"
  to = "/.netlify/functions/payment-callback"
  status = 200

[[redirects]]
  from = "/api/create-payment"
  to = "/.netlify/functions/create-payment"
  status = 200
